name: Build EXE

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: pyinstaller CapPhysCombine.spec

      - name: Copy VC++ runtime DLLs
        run: |
          copy C:\Windows\System32\vcruntime140.dll dist\CapPhysCombine\
          copy C:\Windows\System32\vcruntime140_1.dll dist\CapPhysCombine\
          copy C:\Windows\System32\msvcp140.dll dist\CapPhysCombine\

      - name: Create data directory
        run: |
          mkdir dist\CapPhysCombine\data
          echo "将源数据 Excel 文件放入此目录" > dist\CapPhysCombine\data\请将数据文件放入此目录.txt
          mkdir dist\CapPhysCombine\logs

      - name: Package as ZIP
        run: |
          cd dist
          7z a CapPhysCombine.zip CapPhysCombine

      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev-$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CapPhysCombine-${{ steps.get_version.outputs.VERSION }}
          path: dist/CapPhysCombine.zip

      - name: Create Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: CapPhysCombine ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 容量表&物理表处理工具 ${{ steps.get_version.outputs.VERSION }}

            ### 使用说明
            1. 下载并解压 `CapPhysCombine.zip`
            2. 将源数据 Excel 文件放入 `data/` 目录
            3. 运行 `CapPhysCombine.exe`

            ### 功能说明
            - 容量表合成（5G/4G/45G）
            - 物理表汇总
            - 低效小区分析
            - 零低流量风险分析
            - 共站同覆盖表管理
            - Web UI 界面

            ### Web UI 使用
            运行 `CapPhysCombine.exe --serve` 启动 Web 服务，访问 http://localhost:4008
          files: |
            dist/CapPhysCombine.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
